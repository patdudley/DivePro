<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DivePro Dive Conditions</title>
    <script>
      if (window.location.protocol === "file:") {
        window.location.replace("http://127.0.0.1:4176/index.html");
      }
    </script>
    <link rel="stylesheet" href="vendor/maplibre/maplibre-gl.css?v=multisport-7">
    <link rel="stylesheet" href="styles.css?v=content-pages-2">
  </head>
  <body>
    <main class="shell home-shell">
      <header class="home-header">
        <a class="brand-home-link" href="index.html" aria-label="DivePro home">
          <img class="brand-logo" src="divepro-logo.png?v=brand-logo-2" alt="DivePro">
        </a>
      </header>

      <section class="home-hero" aria-label="Dive visibility report">
        <div class="home-hero-copy">
          <h1><span>Dive Visibility</span><span>Report</span></h1>
          <div class="hero-accent-line" aria-hidden="true"></div>
          <p>Get accurate dive conditions, visibility estimates, and the best times to dive at La Jolla and beyond.</p>
        </div>
        <div class="home-hero-preview" aria-label="Live spot preview carousel">
          <button id="heroPrevSpot" class="hero-nav hero-nav-prev" type="button" aria-label="Previous spot">‹</button>
          <div id="heroSpotPreview" class="hero-preview-card" aria-live="polite"></div>
          <button id="heroNextSpot" class="hero-nav hero-nav-next" type="button" aria-label="Next spot">›</button>
        </div>
      </section>

      <section class="home-map-card" aria-label="Dive conditions map">
        <div class="map-header">
          <h2>Conditions Map</h2>
          <span>La Jolla, San Diego</span>
        </div>
        <div class="map-frame">
          <div id="conditionsMap" class="conditions-map" role="img" aria-label="Interactive map centered on La Jolla, San Diego"></div>
          <label class="map-layer-control">
            <span>Layer</span>
            <select id="mapLayerSelect" aria-label="Map data layer">
              <option value="wind">Wind</option>
              <option value="visibility">Visibility</option>
              <option value="none">Off</option>
            </select>
          </label>
          <div id="windLegend" class="wind-legend" aria-label="Wind speed legend">
            <span>Wind mph</span>
            <div class="wind-legend-gradient"></div>
            <div class="wind-legend-labels">
              <b>0</b>
              <b>5</b>
              <b>10</b>
              <b>20+</b>
            </div>
          </div>
          <div id="visibilityLegend" class="wind-legend visibility-legend is-hidden" aria-label="Relative visibility estimate legend">
            <span>Relative visibility estimate</span>
            <div class="visibility-legend-gradient"></div>
            <div class="visibility-legend-labels">
              <b>Lower</b>
              <b>Fair</b>
              <b>Clearer</b>
            </div>
            <small>La Jolla only: calibrated feet</small>
          </div>
          <div id="windDateBubble" class="wind-date-bubble home-wind-date-bubble" hidden></div>
          <div id="windTimeline" class="wind-timeline home-wind-timeline" aria-label="Wind forecast timeline">
            <button id="windPrevDayButton" class="wind-prev-day" type="button" aria-label="Previous day wind forecast">‹</button>
            <div class="wind-play-stack">
              <button id="windPlayButton" type="button" aria-label="Play wind forecast timeline">▶</button>
              <span id="windCurrentTime" class="wind-current-time">Now</span>
            </div>
            <div class="wind-slider-wrap">
              <input id="windTimeSlider" type="range" min="0" max="0" value="0" step="1" aria-label="Wind forecast hour">
              <span id="windThumbTime" class="wind-thumb-time" aria-hidden="true">Now</span>
            </div>
            <button id="windNextDayButton" class="wind-next-day" type="button" aria-label="Next day wind forecast">›</button>
            <div id="windTimeTicks" class="wind-time-ticks" aria-hidden="true"></div>
          </div>
        </div>
        <p id="mapStatus" class="map-status">Loading map...</p>
      </section>

      <section class="spot-list" id="spotList" aria-label="Dive condition spots"></section>
    </main>
    <script src="vendor/maplibre/maplibre-gl.js?v=multisport-7"></script>
    <script src="map-config.js?v=multisport-7"></script>
    <script src="spots-config.js?v=dive-only-4"></script>
    <script src="home.js?v=home-map-timeline-2"></script>
  </body>
</html>
