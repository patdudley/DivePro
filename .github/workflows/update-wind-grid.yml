name: Update Wind Grid

on:
  schedule:
    # Daily, after NOAA finishes publishing the 12z GFS cycle's hourly files
    # (~16:00 UTC). The script's latest_cycle() maps 17:30 UTC to the 12z run.
    - cron: "30 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-wind-grid
  cancel-in-progress: true

jobs:
  update-wind-grid:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install wind tooling dependencies
        run: python -m pip install -r requirements-wind.txt

      - name: Verify GRIB runtime
        run: python -m cfgrib selfcheck

      - name: Build wind grid frames
        run: python scripts/build_gfs_wind_grid.py

      - name: Commit updated wind data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A data/wind-cropped data/water-mask-san-diego.geojson
          git commit -m "Update wind grid" || echo "No wind changes to commit"
          # Rebase onto any commits pushed while this run was in flight so the
          # push does not fail and trigger a false failure alert.
          git pull --rebase origin main
          git push

      - name: Notify on failure
        if: failure()
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        run: |
          python3 - << 'PY'
          import json, os, urllib.request, urllib.parse
          try:
              cfg = json.loads(os.environ.get("CONFIG_JSON", "{}"))
              tg = cfg.get("telegram", {})
              token = tg.get("bot_token")
              chat_id = tg.get("chat_id")
              if not token or not chat_id:
                  print("Telegram not configured — skipping alert")
                  exit(0)
              msg = "DivePro wind grid update FAILED. Check GitHub Actions: https://github.com/patdudley/DivePro/actions"
              payload = urllib.parse.urlencode({"chat_id": chat_id, "text": msg}).encode()
              urllib.request.urlopen(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=payload,
                  timeout=10,
              )
              print("Telegram alert sent")
          except Exception as exc:
              print(f"Telegram alert failed (non-fatal): {exc}")
          PY
