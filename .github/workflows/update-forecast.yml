name: Update La Jolla Forecast

on:
  schedule:
    # GitHub cron is UTC. During Pacific daylight time this gives retries just
    # after midnight, around 7am, and around noon PT. Midnight prevents the site
    # from showing yesterday as the current report overnight.
    - cron: "5,20,35 7 * * *"
    - cron: "0,15,30 14,19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-la-jolla-forecast
  cancel-in-progress: true

jobs:
  update-forecast:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install forecast dependencies
        run: python -m pip install -r requirements.txt

      - name: Build La Jolla forecast
        run: |
          python - <<'PY'
          from pathlib import Path
          import build_location_forecasts as b

          # The GitHub upload is currently flat at repo root. The original script
          # was authored from scripts/, so override output paths for Pages.
          b.ROOT = Path.cwd()
          b.OUT = b.ROOT / "model_outputs"
          b.SPOT_OUT = b.OUT / "spots"
          b.FORECAST_LOG_PATH = b.ROOT / "forecast_log.csv"
          b.main()
          PY

      - name: Mirror generated JSON to root page files
        run: |
          cp model_outputs/spots/la-jolla.json la-jolla.json
          [ -f model_outputs/latest_forecast.json ] && cp model_outputs/latest_forecast.json latest_forecast.json || true
          [ -f model_outputs/forecast_10day.json ] && cp model_outputs/forecast_10day.json forecast_10day.json || true
          [ -f model_outputs/spots.json ] && cp model_outputs/spots.json spots.json || true
          [ -f model_outputs/diveprosd_grade_guidance.json ] && cp model_outputs/diveprosd_grade_guidance.json diveprosd_grade_guidance.json || true
          [ -f model_outputs/model_metrics.json ] && cp model_outputs/model_metrics.json model_metrics.json || true

      - name: Commit updated forecast artifacts
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add la-jolla.json latest_forecast.json forecast_10day.json spots.json diveprosd_grade_guidance.json model_metrics.json forecast_log.csv model_outputs || true
          git commit -m "Update La Jolla forecast" || echo "No forecast changes to commit"
          # Rebase onto any commits pushed while this run was in flight so the
          # push does not fail and trigger a false failure alert.
          git pull --rebase origin main
          git push

      - name: Notify on failure
        if: failure()
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        run: |
          python3 - << 'PY'
          import json, os, urllib.request, urllib.parse
          try:
              cfg = json.loads(os.environ.get("CONFIG_JSON", "{}"))
              tg = cfg.get("telegram", {})
              token = tg.get("bot_token")
              chat_id = tg.get("chat_id")
              if not token or not chat_id:
                  print("Telegram not configured — skipping alert")
                  exit(0)
              msg = "DivePro forecast update FAILED. Check GitHub Actions: https://github.com/patdudley/DivePro/actions"
              payload = urllib.parse.urlencode({"chat_id": chat_id, "text": msg}).encode()
              urllib.request.urlopen(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=payload,
                  timeout=10,
              )
              print("Telegram alert sent")
          except Exception as exc:
              print(f"Telegram alert failed (non-fatal): {exc}")
          PY
