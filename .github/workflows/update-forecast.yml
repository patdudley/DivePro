name: Update La Jolla Forecast

on:
  schedule:
    # GitHub cron is UTC. These are roughly 6am, noon, and 6pm Pacific during PDT.
    - cron: "0 1,13,19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-forecast:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install forecast dependencies
        run: python -m pip install -r requirements.txt

      - name: Build La Jolla forecast
        run: |
          python - <<'PY'
          from pathlib import Path
          import build_location_forecasts as b

          # The GitHub upload is currently flat at repo root. The original script
          # was authored from scripts/, so override output paths for Pages.
          b.ROOT = Path.cwd()
          b.OUT = b.ROOT / "model_outputs"
          b.SPOT_OUT = b.OUT / "spots"
          b.FORECAST_LOG_PATH = b.ROOT / "forecast_log.csv"
          b.main()
          PY

      - name: Mirror generated JSON to root page files
        run: |
          cp model_outputs/spots/la-jolla.json la-jolla.json
          [ -f model_outputs/latest_forecast.json ] && cp model_outputs/latest_forecast.json latest_forecast.json || true
          [ -f model_outputs/forecast_10day.json ] && cp model_outputs/forecast_10day.json forecast_10day.json || true
          [ -f model_outputs/spots.json ] && cp model_outputs/spots.json spots.json || true
          [ -f model_outputs/diveprosd_grade_guidance.json ] && cp model_outputs/diveprosd_grade_guidance.json diveprosd_grade_guidance.json || true
          [ -f model_outputs/model_metrics.json ] && cp model_outputs/model_metrics.json model_metrics.json || true

      - name: Commit updated forecast artifacts
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add la-jolla.json latest_forecast.json forecast_10day.json spots.json diveprosd_grade_guidance.json model_metrics.json forecast_log.csv model_outputs || true
          git commit -m "Update La Jolla forecast" || echo "No forecast changes to commit"
          git push
