<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DivePro Snapshot Capture</title>
    <style>
      html,
      body {
        margin: 0;
        background: #000;
      }

      iframe {
        display: block;
        width: 1280px;
        height: 720px;
        border: 0;
        background: #000;
      }
    </style>
  </head>
  <body>
    <iframe
      id="camera"
      title="Live camera capture"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen>
    </iframe>
    <script>
      const params = new URLSearchParams(window.location.search);
      const video = params.get("video");
      const camera = document.getElementById("camera");
      const origin = encodeURIComponent(window.location.origin);
      camera.src = `https://www.youtube.com/embed/${video}?autoplay=1&mute=1&playsinline=1&controls=0&rel=0&modestbranding=1&origin=${origin}`;
    </script>
  </body>
</html>
